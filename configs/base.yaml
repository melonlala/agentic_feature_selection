env:
  env_id: "Taxi-v3"
  noise_dim: 4
  noise_type: "gaussian"
  categorical_noise_cardinality: 5

teacher:
  algo: "dqn"
  total_timesteps: 300000
  learning_rate: 0.001
  buffer_size: 50000
  batch_size: 64
  gamma: 0.99
  learning_starts: 10000      # start gradient updates early; SB3 default=50000 is too late
  target_update_interval: 500
  train_freq: 4
  exploration_fraction: 0.3   # epsilon decays over first 90k steps, well past learning_starts
  exploration_final_eps: 0.05
  net_arch: [128, 128]
  eval_episodes: 20

dataset:
  n_collect_steps: 50000
  train_size: 30000
  val_size: 5000
  test_size: 5000
  deduplicate: false

shap:
  background_size: 200
  explain_size: 500
  target: "chosen_action_prob"
  nsamples: "auto"
  imputer: "marginal"

student:
  hidden_dims: [64, 64]
  lr: 0.001
  epochs: 30
  batch_size: 128
  use_soft_distill: false
  distill_alpha: 0.5
  topk_list: [1, 2, 3, 4, 6, 8]

eval:
  online_episodes: 100
  offline_batch_size: 512

logging:
  save_csv: true
  save_json: true
